[theme]
primaryColor        = "#4a90d9"
backgroundColor     = "#0e1117"
secondaryBackgroundColor = "#1e2130"
textColor           = "#e8e8e8"
font                = "monospace"

[server]
headless            = true      # required for cloud deployment
enableCORS          = false
enableXsrfProtection = true

[browser]
gatherUsageStats    = false
